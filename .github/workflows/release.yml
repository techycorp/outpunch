name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Detect which ecosystems have changed since the previous tag
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      rust:   ${{ steps.check.outputs.rust }}
      python: ${{ steps.check.outputs.python }}
      node:   ${{ steps.check.outputs.node }}
      ruby:   ${{ steps.check.outputs.ruby }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed paths since previous tag
        id: check
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "rust=true"   >> $GITHUB_OUTPUT
            echo "python=true" >> $GITHUB_OUTPUT
            echo "node=true"   >> $GITHUB_OUTPUT
            echo "ruby=true"   >> $GITHUB_OUTPUT
          else
            git diff --quiet "$PREV_TAG" HEAD -- crates/                       && echo "rust=false"   >> $GITHUB_OUTPUT || echo "rust=true"   >> $GITHUB_OUTPUT
            git diff --quiet "$PREV_TAG" HEAD -- bindings/python/ crates/      && echo "python=false" >> $GITHUB_OUTPUT || echo "python=true" >> $GITHUB_OUTPUT
            git diff --quiet "$PREV_TAG" HEAD -- bindings/node/ crates/        && echo "node=false"   >> $GITHUB_OUTPUT || echo "node=true"   >> $GITHUB_OUTPUT
            git diff --quiet "$PREV_TAG" HEAD -- adapters/ruby/                && echo "ruby=false"   >> $GITHUB_OUTPUT || echo "ruby=true"   >> $GITHUB_OUTPUT
          fi

  # Phase 1: Publish Rust crates to crates.io
  publish-crates:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: startsWith(github.ref, 'refs/tags/') && needs.detect-changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish outpunch (core)
        run: cargo publish -p outpunch --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published"
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish outpunch-axum
        run: cargo publish -p outpunch-axum --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published"
      - name: Publish outpunch-client
        run: cargo publish -p outpunch-client --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published"

  # Phase 2a: Build PyPI wheels
  pypi-linux:
    runs-on: ${{ matrix.platform.runner }}
    needs: [detect-changes, publish-crates]
    if: needs.detect-changes.outputs.python == 'true'
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          manylinux: manylinux_2_28
          before-script-linux: yum install -y openssl-devel
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: bindings/python/dist

  pypi-musllinux:
    runs-on: ${{ matrix.platform.runner }}
    needs: [detect-changes, publish-crates]
    if: needs.detect-changes.outputs.python == 'true'
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          manylinux: musllinux_1_2
          before-script-linux: apt-get update && apt-get install -y libssl-dev pkg-config
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: bindings/python/dist

  pypi-macos:
    runs-on: macos-latest
    needs: [detect-changes, publish-crates]
    if: needs.detect-changes.outputs.python == 'true'
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}-apple-darwin
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: bindings/python/dist

  pypi-windows:
    runs-on: windows-latest
    needs: [detect-changes, publish-crates]
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: bindings/python/dist

  pypi-sdist:
    runs-on: ubuntu-latest
    needs: [detect-changes, publish-crates]
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/python/dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.detect-changes.outputs.python == 'true'
    needs: [detect-changes, pypi-linux, pypi-musllinux, pypi-macos, pypi-windows, pypi-sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
        continue-on-error: true

  # Phase 2b: Build npm native binaries
  npm-build:
    runs-on: ${{ matrix.settings.runner }}
    needs: [detect-changes, publish-crates]
    if: needs.detect-changes.outputs.node == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Install dependencies
        working-directory: bindings/node
        run: npm install --ignore-scripts
      - name: Build native module
        working-directory: bindings/node
        run: npx napi build --platform --release --target ${{ matrix.settings.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.detect-changes.outputs.node == 'true'
    needs: [detect-changes, npm-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        working-directory: bindings/node
        run: npm install --ignore-scripts
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: bindings/node/artifacts
      - name: Move artifacts to platform packages
        working-directory: bindings/node
        run: npx napi artifacts --build-output-dir artifacts
      - name: Publish platform packages
        working-directory: bindings/node
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              npm publish "$dir" --access public || echo "Skipping $dir (already published or error)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - name: Publish main package
        working-directory: bindings/node
        run: npm publish --access public || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}

  # Phase 2c: Publish Ruby gems
  publish-rubygems:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.detect-changes.outputs.ruby == 'true'
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build and publish outpunch-rack
        working-directory: adapters/ruby/rack
        run: |
          gem build outpunch-rack.gemspec
          gem push outpunch-rack-*.gem || echo "Already published"
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - name: Build and publish outpunch
        working-directory: adapters/ruby/rails
        run: |
          gem build outpunch.gemspec
          gem push outpunch-*.gem || echo "Already published"
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

  # Phase 3: GitHub Release
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && always()
    needs: [detect-changes, publish-crates, publish-pypi, publish-npm, publish-rubygems]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
