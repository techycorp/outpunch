name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Phase 1: Publish Rust crates to crates.io
  publish-crates:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish outpunch (core)
        run: cargo publish -p outpunch --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published"
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish outpunch-axum
        run: cargo publish -p outpunch-axum --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published"
      - name: Publish outpunch-client
        run: cargo publish -p outpunch-client --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published"

  # Phase 2a: Build PyPI wheels
  pypi-linux:
    runs-on: ${{ matrix.platform.runner }}
    needs: [publish-crates]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          manylinux: auto
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: bindings/python/dist

  pypi-musllinux:
    runs-on: ${{ matrix.platform.runner }}
    needs: [publish-crates]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          manylinux: musllinux_1_2
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: bindings/python/dist

  pypi-macos:
    runs-on: macos-latest
    needs: [publish-crates]
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}-apple-darwin
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: bindings/python/dist

  pypi-windows:
    runs-on: windows-latest
    needs: [publish-crates]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: bindings/python/dist

  pypi-sdist:
    runs-on: ubuntu-latest
    needs: [publish-crates]
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/python/dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [pypi-linux, pypi-musllinux, pypi-macos, pypi-windows, pypi-sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
        continue-on-error: true

  # Phase 2b: Build npm native binaries
  npm-build:
    runs-on: ${{ matrix.settings.runner }}
    needs: [publish-crates]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Install dependencies
        working-directory: bindings/node
        run: npm ci
      - name: Build native module
        working-directory: bindings/node
        run: npx napi build --platform --release --target ${{ matrix.settings.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [npm-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        working-directory: bindings/node
        run: npm ci
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: bindings/node/artifacts
      - name: Move artifacts to platform packages
        working-directory: bindings/node
        run: npx napi artifacts --build-output-dir artifacts
      - name: Publish platform packages
        working-directory: bindings/node
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              npm publish "$dir" --access public || echo "Skipping $dir (already published or error)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - name: Publish main package
        working-directory: bindings/node
        run: npm publish --access public || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}

  # Phase 3: GitHub Release
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish-crates, publish-pypi, publish-npm]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
